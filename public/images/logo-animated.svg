<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <style>
      .hex-lg {
        fill: none;
        stroke: #111111;
        stroke-width: 4.4;
        stroke-linejoin: round;
        stroke-dasharray: 312;
        stroke-dashoffset: 312;
        animation: draw-lg 0.85s cubic-bezier(0.4,0,0.2,1) 0.1s forwards;
      }
      .ln1-lg, .ln2-lg, .ln3-lg {
        fill: none;
        stroke: #111111;
        stroke-width: 3.6;
        stroke-linecap: round;
      }
      .ln1-lg {
        stroke-dasharray: 44; stroke-dashoffset: 44;
        animation: draw-lg 0.35s ease 0.95s forwards;
      }
      .ln2-lg {
        stroke-dasharray: 44; stroke-dashoffset: 44;
        animation: draw-lg 0.35s ease 1.1s forwards;
      }
      .ln3-lg {
        stroke-dasharray: 42; stroke-dashoffset: 42;
        animation: draw-lg 0.35s ease 1.25s forwards;
      }
      .nd-lg {
        opacity: 0;
        animation: pop-lg 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
        fill: #111111;
      }
      .nd1-lg { animation-delay: 1.28s; transform-origin: 72px 54px; }
      .nd2-lg { animation-delay: 1.40s; transform-origin: 52px 94px; }
      .nd3-lg { animation-delay: 1.52s; transform-origin: 92px 94px; }
      .wm-lg {
        opacity: 0;
        animation: slidein-lg 0.55s cubic-bezier(0.4,0,0.2,1) 1.6s forwards;
        font-family: Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 68px;
        fill: #111111;
        letter-spacing: -2.4px;
      }
      .tl-lg {
        opacity: 0;
        animation: fadein-lg 0.5s ease 2.0s forwards;
        font-family: Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 13px;
        fill: #2DD4BF;
        letter-spacing: 3.5px;
        font-weight: 500;
      }
      @keyframes draw-lg { to { stroke-dashoffset: 0; } }
      @keyframes pop-lg {
        0%   { opacity: 0; transform: scale(0); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes slidein-lg {
        0%   { opacity: 0; transform: translateX(-14px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadein-lg {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
    </style>
  </defs>

  <polygon class="hex-lg" points="124,80 98,125 46,125 20,80 46,35 98,35"/>
  <line class="ln1-lg" x1="72" y1="54" x2="52" y2="94"/>
  <line class="ln2-lg" x1="72" y1="54" x2="92" y2="94"/>
  <line class="ln3-lg" x1="52" y1="94" x2="92" y2="94"/>
  <circle class="nd-lg nd1-lg" cx="72" cy="54" r="6.4"/>
  <circle class="nd-lg nd2-lg" cx="52" cy="94" r="6.4"/>
  <circle class="nd-lg nd3-lg" cx="92" cy="94" r="6.4"/>
  <text class="wm-lg" x="152" y="102">
    <tspan font-weight="300">crew</tspan><tspan font-weight="600">board</tspan>
  </text>
  <text class="tl-lg" x="156" y="128">WEB3 TALENT MARKETPLACE</text>
</svg>
