<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 160">
  <!-- Hexagon -->
  <polygon points="124,80 98,125 46,125 20,80 46,35 98,35"
    fill="none" stroke="#2DD4BF" stroke-width="6" stroke-linejoin="round"/>
  <!-- Equilateral triangle — circumradius 30, centered at (72,80) -->
  <line x1="72" y1="50" x2="46" y2="95" stroke="#2DD4BF" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="72" y1="50" x2="98" y2="95" stroke="#2DD4BF" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="46" y1="95" x2="98" y2="95" stroke="#2DD4BF" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="72" cy="50" r="10" fill="#2DD4BF"/>
  <circle cx="46" cy="95" r="10" fill="#2DD4BF"/>
  <circle cx="98" cy="95" r="10" fill="#2DD4BF"/>
</svg>
